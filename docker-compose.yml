services:
  music-lib:
    build: .
    ports:
      - "35280:35280"
    environment:
      - PORT=35280
      - GIN_MODE=release
      - LOG_LEVEL=info
      - MUSIC_DIR=/music
      - DATA_DIR=/data
      - CORS_ORIGINS=*
    volumes:
      - ./data:/data       # SQLite database
      - ./music:/music     # downloaded audio files
      # NAS deployment — replace with:
      # - /volume1/music:/music
      # - /volume1/config/music-lib:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:35280/health"]
      interval: 30s
      timeout: 5s
      retries: 3
